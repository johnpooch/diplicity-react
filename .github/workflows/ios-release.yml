name: iOS Release

on:
  push:
    branches:
      - main
    paths:
      - "packages/web/**"

concurrency:
  group: ios-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-15
    timeout-minutes: 30
    defaults:
      run:
        working-directory: packages/web

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: packages/web/package-lock.json

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: packages/web

      - name: Install npm dependencies
        run: npm ci

      - name: Build web app
        run: npm run build
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          VITE_DIPLICITY_API_BASE_URL: ${{ vars.SERVICE_BASE_URL }}
          VITE_MAINTENANCE_MODE: ${{ vars.MAINTENANCE_MODE }}
          VITE_GOOGLE_IOS_CLIENT_ID: ${{ secrets.VITE_GOOGLE_IOS_CLIENT_ID }}

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Build and upload to TestFlight
        run: bundle exec fastlane ios release
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
