name: Claude Code

on:
  issue_comment:
    types: [created]
  issues:
    types: [labeled]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  claude:
    if: |
      (
        github.event_name == 'issue_comment' &&
        contains(github.event.comment.body, '@claude') &&
        contains(fromJson('["johnpooch", "JorenC"]'), github.event.comment.user.login)
      ) || (
        github.event_name == 'pull_request_review_comment' &&
        contains(github.event.comment.body, '@claude') &&
        contains(fromJson('["johnpooch", "JorenC"]'), github.event.comment.user.login)
      ) || (
        github.event_name == 'issues' &&
        github.event.action == 'labeled' &&
        contains(fromJson('["claude-fix", "claude-investigate"]'), github.event.label.name)
      )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code (mention)
        if: |
          (github.event_name == 'issue_comment' || github.event_name == 'pull_request_review_comment') &&
          contains(github.event.comment.body, '@claude')
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          allowed_tools: "Bash,Edit,Write,Read,Glob,Grep,MultiEdit"
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Claude Code (claude-investigate label)
        if: |
          github.event_name == 'issues' &&
          github.event.action == 'labeled' &&
          github.event.label.name == 'claude-investigate'
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          allowed_tools: "Bash,Read,Glob,Grep"
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            Investigate the issue described above. Read the relevant code, understand the problem,
            and post a detailed comment explaining:
            - What the root cause is
            - Which files are involved
            - What a fix would look like (without implementing it)

      - name: Run Claude Code (claude-fix label)
        if: |
          github.event_name == 'issues' &&
          github.event.action == 'labeled' &&
          github.event.label.name == 'claude-fix'
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          allowed_tools: "Bash,Edit,Write,Read,Glob,Grep,MultiEdit"
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            Implement a fix for the issue described above. Create a new branch, make the
            necessary code changes, and open a pull request with a clear description of
            what was changed and why.
