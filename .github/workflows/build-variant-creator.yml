name: Build Variant Creator

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: packages/variant-creator/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: packages/variant-creator

      - name: Build
        run: npm run build
        working-directory: packages/variant-creator
