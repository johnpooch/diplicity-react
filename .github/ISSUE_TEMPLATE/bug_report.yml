name: Bug Report
description: Report a bug in Diplicity
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: input
    id: game_url
    attributes:
      label: Game URL
      description: URL of the affected game, if applicable.
      placeholder: "https://diplicity.com/game/..."

  - type: input
    id: screen_url
    attributes:
      label: Screen URL
      description: URL of the screen where the bug occurs, if applicable.
      placeholder: "https://diplicity.com/..."

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Step-by-step instructions to reproduce the bug.
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: screenshot
    attributes:
      label: Screenshot
      description: If applicable, add a screenshot to help explain the problem.
